<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" fill="#F4EFE6"/>
  <!-- ⚗ Laboratory flask motif — the Laboratorium signature mark -->
  <g stroke="#141210" stroke-linecap="round" stroke-linejoin="round">
    <!-- Flask neck -->
    <line x1="13" y1="5" x2="19" y2="5" stroke-width="1.5"/>
    <line x1="14" y1="5" x2="14" y2="13" stroke-width="1.5"/>
    <line x1="18" y1="5" x2="18" y2="13" stroke-width="1.5"/>
    <!-- Flask body -->
    <path d="M14 13 L7 24 Q6.5 26 9 26 L23 26 Q25.5 26 25 24 L18 13 Z" stroke-width="1.5" fill="none"/>
  </g>
  <!-- Liquid / bubbles in accent color -->
  <path d="M9.5 24 Q16 20 22.5 24" stroke="none" fill="#E5402A" opacity="0.9"/>
  <circle cx="13.5" cy="22" r="1" fill="#E5402A" opacity="0.8"/>
  <circle cx="18" cy="20.5" r="1.4" fill="#E5402A" opacity="0.6"/>
</svg>
