version: '3.9'

services:
  app:
    build:
      context: .
      args:
        NEXT_PUBLIC_SERVER_URL: ${NEXT_PUBLIC_SERVER_URL:-http://localhost:3000}
        DATABASE_URI: ${DATABASE_URI:-postgresql://postgres:postgres@postgres:5432/laboratorium}
        PAYLOAD_SECRET: ${PAYLOAD_SECRET:-change-me-in-production}
    image: laboratorium-web
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      DATABASE_URI: ${DATABASE_URI:-postgresql://postgres:postgres@postgres:5432/laboratorium}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: laboratorium
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
